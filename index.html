<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>RotaPDF</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button id="darkToggle" class="dark-toggle" title="Alternar modo escuro" aria-label="Alternar modo escuro">🌙</button>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">PWA para rotas</p>
        <h1>RotaPDF</h1>
        <p class="subtitle">
          Abra um PDF, extraia enderecos automaticamente e navegue direto no Waze.
        </p>
      </header>

      <section class="panel uploader">
        <h2>1) Escolha o PDF</h2>
        <p>
          Voce pode selecionar manualmente ou abrir com este app no celular (quando instalado).
        </p>
        <input id="pdfInput" type="file" accept="application/pdf" />
        <div class="row">
          <label class="checkline">
            <input id="autoOpen" type="checkbox" />
            Redirecionar automaticamente para o primeiro endereco encontrado
          </label>
        </div>
        <button id="analyzeBtn" class="btn" type="button">Analisar PDF</button>
      </section>

      <section class="panel" id="viewerPanel">
        <h2>2) Visualizar PDF</h2>
        <p id="viewerHint" class="muted">Nenhum PDF carregado.</p>
        <div class="viewer-actions">
          <button id="openNativeBtn" class="waze-btn" type="button" disabled>Abrir no padrao</button>
        </div>
        <div id="pdfCanvasContainer" class="pdf-canvas-container"></div>
      </section>

      <section class="panel status" id="statusPanel" aria-live="polite">
        Pronto para analisar.
      </section>

      <section class="panel" id="resultsPanel">
        <h2>3) Enderecos encontrados</h2>
        <ul id="addressList" class="address-list"></ul>
      </section>

    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
